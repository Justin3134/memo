databases:
  - name: memo-db
    plan: free
    databaseName: memo
    user: memo

services:
  - type: web
    name: memo-lyux
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: memo-db
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: YUTORI_API_KEY
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: MODULATE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SENSO_API_KEY
        sync: false
      - key: REKA_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false

  - type: web
    name: memofe
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://memo-lyux.onrender.com
